#TTL
security.jwt.access.timeout=300
#minute
security.jwt.refresh.timeout=30
#day
security.jwt.reset.timeout=15
#minute
# jwt secret key
security.jwt.access.secretKey=${ACCESS_SECRET}
security.jwt.refresh.secretKey=${REFRESH_SECRET}
security.jwt.reset.secretKey=${RESET_SECRET}
# database
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true
# init data setup
#spring.sql.init.mode=always
#spring.sql.init.data-locations=classpath:data-${spring.profiles.active}.sql
#spring.jpa.defer-datasource-initialization=true
# web push api key
vapid.public.key=${VAPID_PUBLIC_KEY}
vapid.private.key=${VAPID_PRIVATE_KEY}
vapid.subject=${VAPID_SUBJECT}
#AI env
gemini.api-key=${GEMINI_API_KEY}
#Frontend port
front-end.port=${http://localhost:3000}






